services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      network: host
    container_name: nuralim_portfolio
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - .env
    command: node server.js
    volumes:
      - ./temp-docs:/app/temp-docs
    networks:
      - apps_database_network

networks:
  apps_database_network:
    external: true
    name: postgres-network